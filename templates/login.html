<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        const t = localStorage.getItem('dashboard_theme') ||
            (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', t);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.18);
            --input-bg: rgba(255,255,255,0.06);
            --text: #e8e8ed;
            --text-muted: #7a7a8a;
            --accent: #6c63ff;
            --accent-soft: rgba(108,99,255,0.15);
            --accent-glow: rgba(108,99,255,0.3);
            --danger: #f87171;
            --danger-soft: rgba(248,113,113,0.1);
            --success: #34d399;
            --success-soft: rgba(52,211,153,0.1);
        }

        [data-theme="light"] {
            --bg: #f5f5f0;
            --card: rgba(255,255,255,0.8);
            --border: rgba(0,0,0,0.08);
            --border-hover: rgba(0,0,0,0.2);
            --input-bg: rgba(0,0,0,0.05);
            --text: #1a1a2e;
            --text-muted: #6b6b80;
            --accent: #6c63ff;
            --accent-soft: rgba(108,99,255,0.12);
            --accent-glow: rgba(108,99,255,0.2);
            --danger: #dc2626;
            --danger-soft: rgba(220,38,38,0.08);
            --success: #059669;
            --success-soft: rgba(5,150,105,0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 20px;
        }

        .alert-error {
            background: var(--danger-soft);
            border: 1px solid rgba(248,113,113,0.2);
            color: var(--danger);
        }

        .alert-success {
            background: var(--success-soft);
            border: 1px solid rgba(52,211,153,0.2);
            color: var(--success);
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ── Password toggle ── */
        .pw-wrapper { position: relative; }
        .pw-wrapper input { padding-right: 44px; }
        .pw-toggle {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 1rem; padding: 4px 6px;
            border-radius: 6px; transition: color 0.2s; width: auto; margin: 0;
        }
        .pw-toggle:hover { color: var(--text); opacity: 1; box-shadow: none; transform: translateY(-50%); }

        /* ── Background orbs ── */
        .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-orbs::before, .bg-orbs::after { content: ''; position: absolute; border-radius: 50%; filter: blur(90px); }
        .bg-orbs::before { width: 500px; height: 500px; background: var(--accent); opacity: .035; top: -160px; left: -140px; animation: orbDrift 22s ease-in-out infinite alternate; }
        .bg-orbs::after  { width: 380px; height: 380px; background: var(--success); opacity: .03; bottom: -120px; right: -100px; animation: orbDrift 18s ease-in-out 9s infinite alternate-reverse; }
        [data-theme="light"] .bg-orbs { display: none; }
        @keyframes orbDrift { 0% { transform: translate(0,0); } 100% { transform: translate(50px,35px); } }

        .card { position: relative; z-index: 1; }
    </style>
</head>
<body>
    <div class="bg-orbs" aria-hidden="true"></div>
    <div class="card">
        <div class="logo">⚡</div>
        <h1>Tekrar hoş geldin</h1>
        <p class="subtitle">Dashboard'a giriş yap</p>

        {% if registered %}
        <div class="alert alert-success">Kayıt başarılı! Şimdi giriş yapabilirsin.</div>
        {% endif %}

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Kullanıcı adı</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <div class="pw-wrapper">
                    <input type="password" name="password" id="pw-input" autocomplete="current-password" required>
                    <button type="button" class="pw-toggle" onclick="togglePw('pw-input')" tabindex="-1" title="Şifreyi göster/gizle">👁</button>
                </div>
            </div>
            <button type="submit" class="btn">Giriş Yap</button>
        </form>

        <div class="footer">
            Hesabın yok mu? <a href="/register">Kayıt ol</a>
            &nbsp;·&nbsp; <a href="/forgot-password">Şifremi unuttum</a>
        </div>
    </div>
    <script>
        function togglePw(id) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
